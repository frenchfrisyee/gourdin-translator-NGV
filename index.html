<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gourdin Translator (Offline)</title>
<style>
body { font-family: Arial; background:#111; color:#eee; padding:40px; }
textarea { width:100%; height:100px; margin-bottom:10px; }
button { padding:10px 20px; cursor:pointer; }
#output { margin-top:20px; font-size:20px; }
</style>
</head>
<body>

<h1>🎃 Gourdin Translator (Offline)</h1>

<textarea id="input" placeholder="Type English..."></textarea>
<br>
<button id="translateBtn">Translate</button>

<div id="output"></div>

<script>
// basic dictionary
const dict = {
  "i": "mael",
  "you": "vael",
  "we": "maelou",
  "pumpkin": "vourath",
  "seed": "toumel",
  "seeds": "toumel-rael",
  "field": "ouvra",
  "sun": "hovel",
  "harvest": "goumen",
  "friend": "ouvel",
  "home": "voumin"
};

// verbs
const verbs = {
  "carry": "vouth-avel",
  "remember": "oumael-avel",
  "love": "vouloum-avel",
  "see": "thaelou-avel",
  "go": "selvael-avel",
  "grow": "tourin-avel"
};

// simple translator
window.translate = function() {
  const input = document.getElementById("input").value.toLowerCase();
  const words = input.split(" ");

  let subject = "";
  let verb = "";
  let object = "";

  words.forEach(w => {
    if (dict[w]) {
      if (!subject) subject = dict[w];
      else object = dict[w];
    } else if (verbs[w]) {
      verb = verbs[w];
    }
  });

  // Gourdin order: Object · Verb · Subject
  let result = "";

  if (object) result += object + " · ";
  if (verb) result += verb + " · ";
  if (subject) result += subject;

  if (!result) result = "… (no translation found)";

  document.getElementById("output").innerText = result;
};

// button
document.getElementById("translateBtn").addEventListener("click", translate);

// enter shortcut
document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter") translate();
});
</script>

</body>
</html>
