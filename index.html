<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gourdin Translator</title>
<style>
  body { font-family: Arial, sans-serif; background:#111; color:#eee; padding:40px; }
  textarea { width:100%; height:100px; font-size:18px; padding:10px; border-radius:6px; border:none; background:#222; color:#eee; }
  button { padding:10px 20px; font-size:18px; cursor:pointer; border:none; border-radius:6px; background:#444; color:#eee; margin-top:10px; }
  #outputSection { margin-top:20px; display:none; }
  #output { font-size:22px; margin-bottom:5px; }
  #proText { font-style:italic; color:#aaa; }
</style>
</head>
<body>

<h1>🎃 Gourdin Translator</h1>

<textarea id="input" placeholder="Type anything..."></textarea>
<br>
<button onclick="translate()">Translate</button>

<div id="outputSection">
  <div id="output"></div>
  <div id="proText"></div>
</div>

<script>
// ---------------------------
// LETTER MAPPING
// ---------------------------
const letterMap = {
  a:"g", b:"t", c:"r", d:"v", e:"e", f:"th", g:"o",
  h:"h", i:"i", j:"j", k:"k", l:"l", m:"m", n:"n",
  o:"u", p:"p", q:"q", r:"ra", s:"s", t:"ta",
  u:"oo", v:"ve", w:"w", x:"x", y:"y", z:"z"
};

// ---------------------------
// Convert a single word
// ---------------------------
function convertWord(word) {
  return word.split("").map(l => letterMap[l] || l).join("");
}

// ---------------------------
// TRANSLATE FUNCTION (GLOBAL!)
// ---------------------------
function translate() {
  const inputEl = document.getElementById("input");
  const outputEl = document.getElementById("output");
  const proEl = document.getElementById("proText");
  const section = document.getElementById("outputSection");

  if (!inputEl || !outputEl) return;

  const input = inputEl.value.toLowerCase();
  const result = input
    .split(/\s+/)
    .map(convertWord)
    .join(" · ");

  outputEl.textContent = result;
  proEl.textContent = result.toUpperCase().replace(/(.{2,3})/g,"$1-");
  section.style.display = "block";
}

// Optional: Press Enter to translate
document.getElementById("input").addEventListener("keydown", e => {
  if(e.key === "Enter") translate();
});
</script>

</body>
</html>
