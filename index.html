<script>
// SIMPLE LETTER MAP (edit this however you want)
const map = {
  a:"g", b:"t", c:"r", d:"v", e:"e", f:"th", g:"o",
  h:"h", i:"i", j:"j", k:"k", l:"l", m:"m", n:"n",
  o:"u", p:"p", q:"q", r:"ra", s:"s", t:"ta",
  u:"oo", v:"ve", w:"w", x:"x", y:"y", z:"z"
};
alert("NEW VERSION LOADED");
// convert ONE word
function convertWord(word) {
  return word.split("").map(letter => map[letter] || letter).join("");
}

// MAIN TRANSLATE FUNCTION (GLOBAL = IMPORTANT)
window.translate = function() {
  const input = document.getElementById("input").value.toLowerCase();

  const result = input
    .split(/\s+/)
    .map(word => convertWord(word))
    .join(" · ");

  document.getElementById("gourdinText").innerText = result;

  // show output section if you have one
  const outputSection = document.getElementById("outputSection");
  if (outputSection) outputSection.classList.add("visible");
};

// FIX BUTTON (NO onclick needed)
document.getElementById("translateBtn").addEventListener("click", window.translate);

// ENTER KEY
document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter") window.translate();
});
</script>
