<script>
// LETTER → GOURDIN MAPPING
const letterMap = {
  a:"g", b:"t", c:"r", d:"v", e:"e", f:"th", g:"o",
  h:"h", i:"i", j:"j", k:"k", l:"l", m:"m", n:"n",
  o:"u", p:"p", q:"q", r:"ra", s:"s", t:"ta",
  u:"oo", v:"ve", w:"w", x:"x", y:"y", z:"z"
};

// CONVERT ONE WORD
function convertWord(word) {
  return word.split("").map(l => letterMap[l] || l).join("");
}

// MAKE TRANSLATE GLOBAL
window.translate = function() {
  const inputEl = document.getElementById('input');
  const outputEl = document.getElementById('gourdinText');
  const proEl = document.getElementById('proText');
  const outputSection = document.getElementById('outputSection');

  if (!inputEl || !outputEl) return;

  const input = inputEl.value.toLowerCase();

  const result = input
    .split(/\s+/)
    .map(convertWord)
    .join(" · ");

  outputEl.textContent = result;

  if (proEl) proEl.textContent = result.toUpperCase().replace(/(.{2,3})/g,"$1-");

  if (outputSection) outputSection.classList.add('visible');
};

// OPTIONAL: Enter key triggers translate
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.translate();
});

// CLEAR INPUT / OUTPUT
window.clearAll = function() {
  const inputEl = document.getElementById('input');
  const outputSection = document.getElementById('outputSection');
  if (inputEl) inputEl.value = '';
  if (outputSection) outputSection.classList.remove('visible');
};

// EXAMPLES BUTTONS
window.setEx = function(text) {
  const inputEl = document.getElementById('input');
  if (inputEl) {
    inputEl.value = text;
    inputEl.focus();
  }
};
</script>
