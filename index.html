<script>
alert("Gourdin Translator Loaded!");

// Letter → Gourdin mapping
const map = {
  a:"g", b:"t", c:"r", d:"v", e:"e", f:"th", g:"o",
  h:"h", i:"i", j:"j", k:"k", l:"l", m:"m", n:"n",
  o:"u", p:"p", q:"q", r:"ra", s:"s", t:"ta",
  u:"oo", v:"ve", w:"w", x:"x", y:"y", z:"z"
};

// Convert a word
function convertWord(word) {
  return word.split("").map(l => map[l] || l).join("");
}

// The function your button calls
function translate() {
  const inputEl = document.getElementById("input");
  const outputEl = document.getElementById("gourdinText");

  if (!inputEl || !outputEl) {
    console.error("Missing elements in HTML: input or output");
    return;
  }

  const input = inputEl.value.toLowerCase();

  const result = input
    .split(/\s+/)
    .map(convertWord)
    .join(" · ");

  outputEl.innerText = result;

  // optional: reveal output section if you have one
  const outputSection = document.getElementById("outputSection");
  if (outputSection) outputSection.classList.add("visible");
}

// Optional: enter key triggers translate
document.addEventListener("keydown", e => {
  if (e.key === "Enter") translate();
});
</script>
