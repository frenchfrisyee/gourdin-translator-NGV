<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gourdin Translator</title>
<style>
body { font-family: Arial; background:#111; color:#eee; padding:40px; }
textarea { width:100%; height:100px; margin-bottom:10px; }
button { padding:10px 20px; cursor:pointer; }
#output { margin-top:20px; font-size:22px; }
#pro { margin-top:10px; color:#aaa; font-style:italic; }
</style>
</head>
<body>

<h1>🎃 Gourdin Translator (Full Language)</h1>

<textarea id="input" placeholder="Type anything..."></textarea>
<br>
<button id="translateBtn">Translate</button>

<div id="output"></div>
<div id="pro"></div>

<script>
// CORE VOCAB (kept)
const core = {
  "i":"mael",
  "you":"vael",
  "we":"maelou",
  "pumpkin":"vourath",
  "seed":"toumel",
  "field":"ouvra",
  "sun":"hovel",
  "harvest":"goumen"
};

// verb endings
const verbEnd = "avel";

// syllables for generating language
const consonants = ["v","l","r","m","n","th","g","h"];
const vowels = ["ou","ae","oa","el","oo"];

// make fake gourdin word
function makeWord(word) {
  if (core[word]) return core[word];

  let syllables = Math.min(3, Math.max(1, Math.ceil(word.length / 3)));
  let result = "";

  for (let i = 0; i < syllables; i++) {
    const c = consonants[Math.floor(Math.random()*consonants.length)];
    const v = vowels[Math.floor(Math.random()*vowels.length)];
    result += c + v;
  }

  return result;
}

// pronunciation generator
function pronounce(g) {
  return g.toUpperCase().replace(/([A-Z]{2,})/g, "$1-");
}

// basic sentence parser
window.translate = function() {
  const input = document.getElementById("input").value.toLowerCase();
  const words = input.split(/\s+/);

  let subject = "";
  let verb = "";
  let object = "";

  words.forEach(w => {
    if (["i","you","we"].includes(w)) {
      subject = makeWord(w);
    } else if (w.endsWith("ing") || w.endsWith("ed")) {
      verb = makeWord(w.replace(/ing|ed/g,"")) + "-" + verbEnd;
    } else if (!verb) {
      object = makeWord(w);
    }
  });

  // fallback
  if (!subject && words.length) subject = makeWord(words[0]);

  let result = `${object} · ${verb || makeWord("be")+"-"+verbEnd} · ${subject}`;
  result = result.replace(/^ ·|· $/g,"");

  document.getElementById("output").innerText = result;
  document.getElementById("pro").innerText = pronounce(result);
};

// events
document.getElementById("translateBtn").addEventListener("click", translate);

document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter") translate();
});
</script>

</body>
</html>
